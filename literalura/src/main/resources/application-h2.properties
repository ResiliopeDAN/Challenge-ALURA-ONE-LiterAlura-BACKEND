# CONFIGURACION PORTABLE (SIN POSTGRES)
# La base de datos se guarda en un archivo dentro de la carpeta /data del proyecto
spring.datasource.url=jdbc:h2:file:./data/literalura
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
hibernate.dialect=org.hibernate.dialect.H2Dialect

# Habilita consola H2 para ver los datos desde el navegador si se desea (opcional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
